<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الخدمات | الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="app-layout">
    <div id="app-sidebar"></div>
    <div class="app-main">
        <div id="app-header"></div>
        <main class="app-content">
            <div class="content-card">
                <h2 class="card-title"><i class="ri-add-circle-line"></i> إضافة خدمة جديدة</h2>
                <form id="serviceForm">
                    <div class="form-group">
                        <label for="serviceName"><i class="ri-service-line"></i> اسم الخدمة</label>
                        <input type="text" id="serviceName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="serviceDescription"><i class="ri-file-text-line"></i> وصف الخدمة</label>
                        <textarea id="serviceDescription" class="form-control" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="ri-add-line"></i> إضافة الخدمة
                    </button>
                </form>
            </div>

            <div class="content-card" style="margin-top:20px;">
                <h2 class="card-title"><i class="ri-list-check-2"></i> الخدمات الحالية</h2>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>اسم الخدمة</th>
                                <th>الوصف</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="serviceTableBody">
                            <tr><td colspan="4" class="table-state">جاري التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        <div id="app-footer"></div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/components/layout.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireAdmin()) return;

        AppLayout.init({
            role: "admin",
            active: "services",
            title: "إدارة الخدمات",
            profileHref: "../staff/profile.html"
        });

        document.getElementById("serviceForm").addEventListener("submit", (e) => AdminPanel.createService(e));

        await AdminPanel.loadServices();
    });
    </script>
</body>
</html>
