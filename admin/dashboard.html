<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="app-layout">
    <div id="app-sidebar"></div>
    <div class="app-main">
        <div id="app-header"></div>
        <main class="app-content">
            <div class="cards-grid">
                <div class="stat-card">
                    <i class="ri-building-2-line"></i>
                    <h3>الأقسام</h3>
                    <p class="stat-value" id="totalDepartments">0</p>
                </div>
                <div class="stat-card">
                    <i class="ri-service-line"></i>
                    <h3>الخدمات</h3>
                    <p class="stat-value" id="totalServices">0</p>
                </div>
                <div class="stat-card">
                    <i class="ri-graduation-cap-line"></i>
                    <h3>الطلاب</h3>
                    <p class="stat-value" id="totalStudents">0</p>
                </div>
                <div class="stat-card">
                    <i class="ri-mail-open-line"></i>
                    <h3>إجمالي الطلبات</h3>
                    <p class="stat-value" id="totalRequests">0</p>
                </div>
            </div>

            <div class="content-card">
                <h3 class="card-title"><i class="ri-compass-3-line"></i> اختصارات الإدارة</h3>
                <div class="action-buttons">
                    <a href="manage-departments.html" class="btn btn-primary">
                        <i class="ri-building-2-line"></i> إدارة الأقسام
                    </a>
                    <a href="manage-services.html" class="btn btn-primary">
                        <i class="ri-service-line"></i> إدارة الخدمات
                    </a>
                    <a href="../staff/request-list.html" class="btn btn-outline">
                        <i class="ri-file-list-3-line"></i> مراجعة الطلبات
                    </a>
                </div>
            </div>
        </main>
        <div id="app-footer"></div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/components/layout.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireAdmin()) return;

        AppLayout.init({
            role: "admin",
            active: "dashboard",
            title: "لوحة الإدارة",
            profileHref: "../staff/profile.html"
        });

        await AdminPanel.loadDashboardStats();
    });
    </script>
</body>
</html>
