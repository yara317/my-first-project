<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأقسام | الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="app-layout">
    <div id="app-sidebar"></div>
    <div class="app-main">
        <div id="app-header"></div>
        <main class="app-content">
            <div class="content-card">
                <h2 class="card-title"><i class="ri-add-circle-line"></i> إضافة قسم جديد</h2>
                <form id="deptForm" class="filters-bar" style="margin-bottom:0;">
                    <input type="text" id="deptName" class="form-control" placeholder="اسم القسم" required>
                    <button type="submit" class="btn btn-primary">
                        <i class="ri-add-line"></i> إضافة
                    </button>
                </form>
            </div>

            <div class="content-card" style="margin-top:20px;">
                <h2 class="card-title"><i class="ri-building-2-line"></i> الأقسام الحالية</h2>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>اسم القسم</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="deptTableBody">
                            <tr><td colspan="3" class="table-state">جاري التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        <div id="app-footer"></div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/components/layout.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireAdmin()) return;

        AppLayout.init({
            role: "admin",
            active: "departments",
            title: "إدارة الأقسام",
            profileHref: "../staff/profile.html"
        });

        document.getElementById("deptForm").addEventListener("submit", (e) => AdminPanel.createDepartment(e));

        await AdminPanel.loadDepartments();
    });
    </script>
</body>
</html>
