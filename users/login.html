<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام الخدمات الجامعية</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-logo">
        <i class="ri-shield-user-line"></i>
    </div>

    <h1>تسجيل الدخول</h1>
    <p>ادخل بياناتك للدخول إلى النظام</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">البريد الإلكتروني</label>
            <div class="input-box">
                <i class="ri-mail-line"></i>
                <input type="email" id="email" required autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور</label>
            <div class="input-box">
                <i class="ri-lock-line"></i>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">دخول</button>
    </form>

    <div class="auth-footer">
        ليس لديك حساب؟ <a href="register.html">إنشاء حساب طالب</a>
    </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    Auth.redirectIfLoggedIn();

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const submitBtn = e.target.querySelector("button[type=submit]");
        submitBtn.disabled = true;
        submitBtn.textContent = "جاري الدخول...";

        try {
            const result = await API.login(email, password);

            if (result.status === 200 && result.data) {
                Auth.setUser(result.data);
                Auth.redirectByRole();
            } else {
                alert(result.message || "بيانات غير صحيحة");
            }
        } catch (err) {
            alert(err.message || "فشل الاتصال بالسيرفر");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "دخول";
        }
    });
});
</script>
</body>
</html>
