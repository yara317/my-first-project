<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | نظام الخدمات الجامعية</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">

<div class="auth-card wide">
    <div class="auth-logo">
        <i class="ri-user-add-line"></i>
    </div>

    <h1>إنشاء حساب طالب</h1>
    <p>سجل حسابك كطالب للوصول إلى خدمات الجامعة</p>

    <div class="auth-note">
        <i class="ri-information-line"></i>
        التسجيل متاح للطلاب فقط. حسابات الموظفين تُنشأ من قبل الإدارة.
    </div>

    <form id="registerForm">
        <div class="form-group">
            <label for="name">الاسم الكامل</label>
            <div class="input-box">
                <i class="ri-user-line"></i>
                <input type="text" id="name" required autocomplete="name">
            </div>
        </div>

        <div class="form-group">
            <label for="email">البريد الإلكتروني</label>
            <div class="input-box">
                <i class="ri-mail-line"></i>
                <input type="email" id="email" required autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور</label>
            <div class="input-box">
                <i class="ri-lock-line"></i>
                <input type="password" id="password" required minlength="6" autocomplete="new-password">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">إنشاء الحساب</button>
    </form>

    <div class="auth-footer">
        لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
    </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    Auth.redirectIfLoggedIn();

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const submitBtn = e.target.querySelector("button[type=submit]");
        submitBtn.disabled = true;
        submitBtn.textContent = "جاري الإنشاء...";

        try {
            const result = await API.register(name, email, password);

            if (result.status === 200 || result.status === 201) {
                alert("تم إنشاء الحساب بنجاح. يمكنك تسجيل الدخول الآن.");
                window.location.href = "login.html";
            } else {
                alert(result.message || "فشل إنشاء الحساب");
            }
        } catch (err) {
            alert(err.message || "فشل الاتصال بالسيرفر");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "إنشاء الحساب";
        }
    });
});
</script>
</body>
</html>
