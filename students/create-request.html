    <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء طلب جديد | الطالب</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="app-layout">
    <div id="app-sidebar"></div>
    <div class="app-main">
        <div id="app-header"></div>
        <main class="app-content">
            <div class="content-card">
                <h2 class="card-title"><i class="ri-file-add-line"></i> إنشاء طلب جديد</h2>
                <p class="text-muted" style="margin-bottom:24px;">قم بتعبئة البيانات وإرسال الطلب</p>

                <form id="requestForm">
                    <div class="form-group">
                        <label for="service_id"><i class="ri-service-line"></i> نوع الخدمة</label>
                        <select id="service_id" class="form-control" required>
                            <option value="">جاري التحميل...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dept_id"><i class="ri-building-line"></i> القسم</label>
                        <select id="dept_id" class="form-control" required>
                            <option value="">جاري التحميل...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="details"><i class="ri-edit-box-line"></i> تفاصيل الطلب</label>
                        <textarea id="details" class="form-control" maxlength="500" required></textarea>
                        <small class="text-muted"><span id="charCount">0</span>/500</small>
                    </div>

                    <div class="form-group">
                        <label for="attachment"><i class="ri-attachment-2"></i> ملف مرفق (قريباً)</label>
                        <input type="file" id="attachment" class="form-control" disabled>
                        <small class="text-muted">سيتم تفعيل رفع الملفات في تحديث لاحق</small>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        <i class="ri-send-plane-fill"></i> إرسال الطلب
                    </button>
                </form>
            </div>
        </main>
        <div id="app-footer"></div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/components/layout.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireRole(AppConfig.ROLES.STUDENT)) return;

        AppLayout.init({
            role: AppConfig.ROLES.STUDENT,
            active: "create",
            title: "طلب جديد",
            subtitle: "تقديم طلب خدمة جامعية"
        });

        await loadFormData();
        document.getElementById("requestForm").addEventListener("submit", createRequest);
        document.getElementById("details").addEventListener("input", (e) => {
            document.getElementById("charCount").textContent = e.target.value.length;
        });
    });

    async function loadFormData() {
        try {
            const [servicesRes, deptsRes] = await Promise.all([
                API.getServices(),
                API.getDepartments()
            ]);

            const serviceSelect = document.getElementById("service_id");
            serviceSelect.innerHTML = '<option value="">اختر الخدمة</option>';
            (servicesRes.data || []).forEach(s => {
                serviceSelect.innerHTML += `<option value="${s.service_id}">${s.name}</option>`;
            });

            const deptSelect = document.getElementById("dept_id");
            deptSelect.innerHTML = '<option value="">اختر القسم</option>';
            (deptsRes.data || []).forEach(d => {
                deptSelect.innerHTML += `<option value="${d.dept_id}">${d.name}</option>`;
            });
        } catch (err) {
            alert("فشل تحميل بيانات النموذج");
        }
    }

    async function createRequest(e) {
        e.preventDefault();
        const user = Auth.getUser();
        const service_id = document.getElementById("service_id").value;
        const dept_id = document.getElementById("dept_id").value;
        const details = document.getElementById("details").value.trim();
        const submitBtn = e.target.querySelector("button[type=submit]");
        submitBtn.disabled = true;

        try {
            const result = await API.createRequest({
                user_id: Number(user.user_id),
                service_id: Number(service_id),
                dept_id: Number(dept_id),
                reason: details
            });

            if (result.status === 200 || result.status === 201) {
                alert("تم إرسال الطلب بنجاح");
                e.target.reset();
                document.getElementById("charCount").textContent = "0";
                window.location.href = "my-request.html";
            } else {
                alert(result.message || "فشل إرسال الطلب");
            }
        } catch (err) {
            alert(err.message);
        } finally {
            submitBtn.disabled = false;
        }
    }
    </script>
</body>
</html>
