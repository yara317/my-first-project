<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الطالب</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-layout">
    <div id="app-sidebar"></div>
    <div class="app-main">
        <div id="app-header"></div>
        <main class="app-content">
            <div class="cards-grid">
                <div class="stat-card">
                    <i class="ri-file-list-3-line"></i>
                    <h3>كل الطلبات</h3>
                    <p class="stat-value" id="all">0</p>
                </div>
                <div class="stat-card">
                    <i class="ri-time-line"></i>
                    <h3>قيد الانتظار</h3>
                    <p class="stat-value" id="pending">0</p>
                </div>
                <div class="stat-card">
                    <i class="ri-checkbox-circle-line"></i>
                    <h3>مقبولة</h3>
                    <p class="stat-value" id="approved">0</p>
                </div>
            </div>
            <div class="chart-container">
                <h3 class="card-title"><i class="ri-pie-chart-line"></i> توزيع الطلبات</h3>
                <canvas id="chart"></canvas>
            </div>
        </main>
        <div id="app-footer"></div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/components/layout.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireRole(AppConfig.ROLES.STUDENT)) return;

        AppLayout.init({
            role: AppConfig.ROLES.STUDENT,
            active: "dashboard",
            title: "مرحباً 👋",
            subtitle: "لوحة تحكم الطالب - متابعة الطلبات"
        });

        await loadStats();
    });

    async function loadStats() {
        const user = Auth.getUser();
        try {
            const result = await API.getUserRequests(user.user_id);
            const data = result.data || [];
            const counts = Utils.countByStatus(data);

            Utils.setText("all", counts.total);
            Utils.setText("pending", counts.pending);
            Utils.setText("approved", counts.approved);

            new Chart(document.getElementById("chart"), {
                type: "doughnut",
                data: {
                    labels: ["قيد الانتظار", "مقبولة", "مرفوضة"],
                    datasets: [{
                        data: [counts.pending, counts.approved, counts.rejected],
                        backgroundColor: ["#f59e0b", "#10b981", "#ef4444"]
                    }]
                },
                options: {
                    plugins: { legend: { labels: { color: "#f1f5f9" } } }
                }
            });
        } catch (err) {
            console.error(err);
        }
    }
    </script>
</body>
</html>
