<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | الطالب</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body class="app-layout">
    <div id="app-sidebar"></div>
    <div class="app-main">
        <div id="app-header"></div>
        <main class="app-content">
            <div id="requestsContainer"></div>
        </main>
        <div id="app-footer"></div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../assets/js/components/layout.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireRole(AppConfig.ROLES.STUDENT)) return;

        AppLayout.init({
            role: AppConfig.ROLES.STUDENT,
            active: "requests",
            title: "طلباتي",
            subtitle: "جميع طلباتك المقدمة"
        });

        await loadRequests();
    });

    let allRequests = [];

    async function loadRequests() {
        const container = document.getElementById("requestsContainer");
        Utils.showLoading(container);

        try {
            const user = Auth.getUser();
            const result = await API.getUserRequests(user.user_id);
            allRequests = result.data || [];
            renderRequests();
        } catch (err) {
            Utils.showError(container);
        }
    }

    function renderRequests() {
        const container = document.getElementById("requestsContainer");

        if (allRequests.length === 0) {
            Utils.showEmpty(container, "لا توجد طلبات بعد", "ri-file-list-3-line");
            return;
        }

        container.innerHTML = allRequests.map(req => `
            <div class="request-card">
                <h3><i class="ri-file-text-line"></i> ${req.service_name || "طلب"}</h3>
                <p>رقم التتبع: <strong>${req.tracking_no || req.request_id}</strong></p>
                <p>الحالة: <span class="status ${req.status}">${Utils.formatStatus(req.status)}</span></p>
                <p><i class="ri-calendar-line"></i> ${req.req_date || "-"}</p>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="openDetails(${req.request_id})">
                        <i class="ri-eye-line"></i> عرض التفاصيل
                    </button>
                    ${req.status === "pending" ? `
                        <button class="btn btn-danger" onclick="cancelRequest(${req.request_id})">
                            <i class="ri-close-circle-line"></i> إلغاء الطلب
                        </button>
                    ` : ""}
                </div>
            </div>
        `).join("");
    }

    function openDetails(id) {
        window.location.href = `request-details.html?id=${id}`;
    }

    async function cancelRequest(requestId) {
        if (!confirm("هل أنت متأكد من إلغاء هذا الطلب؟ لا يمكن التراجع عن هذه الخطوة.")) return;

        const user = Auth.getUser();

        try {
            const result = await API.cancelRequest(requestId, user.user_id);

            if (result.status === 200) {
                const req = allRequests.find(r => r.request_id == requestId);
                if (req) req.status = "cancelled";
                renderRequests();
                alert("تم إلغاء الطلب بنجاح");
            } else {
                alert(result.message || "فشل إلغاء الطلب");
            }
        } catch (err) {
            alert(err.message || "فشل الاتصال بالسيرفر");
        }
    }
    </script>
</body>
</html>
